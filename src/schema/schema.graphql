type Query {
	books: [Book!]!
	book(id: ID!): Book
	authors: [Author!]!
	author(id: ID!): Author
}

type Mutation {
	createBook(title: String!, authorId: ID!): Book!
	createAuthor(name: String!): Author!
}

scalar Date

type Book {
	id: ID!
	title: String!
}

type Author {
	id: ID!
	name: String!
	dateOfBirth: Date
	books: [Book!]!
}
